<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Chat with our AI</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
        <a href="/profile">Profile</a>
        <a href="/resources">Resources</a>
        <a href="/about">About</a>
    </nav>
    <main class="container">
        <div class="card">
            <div id="chat-box" class="border rounded p-3 mb-3" style="height: 300px; overflow-y: scroll;"></div>
            <input type="text" id="user-input" class="form-control" placeholder="Type your message...">
            <button class="btn mt-2" onclick="sendMessage()">Send</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 Mental Health Chatbot</p>
    </footer>
    <script src="/static/js/main.js"></script>
    <script>
        function sendMessage() {
            const userInput = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class='text-end'><strong>You:</strong> ${userInput}</div>`;
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: userInput })
            })
            .then(response => response.json())
            .then(data => {
                chatBox.innerHTML += `<div class='text-start'><strong>Bot:</strong> ${data.response}</div>`;
                document.getElementById('user-input').value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
